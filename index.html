<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="images/store_726569.png" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>GameVault</title>
    <!-- <script src="./script.js" type="module"></script> -->
  </head>
  <body class="md:bg-[#4949ff]">
    <header class="md:mb-4 md:bg-[#4949ff] items-center p-10 justify-between font-bold md:flex md:fixed md:top-0 md:left-0 md:right-0 md:z-50">
      <h1 class="text-2xl text-center text-[#4949ff] md:text-white">
        Explorez une nouvelle façon d'acheter vos jeux
      </h1>
      <nav class="hidden md:block md:text-white">
        <ul
          class="md:flex md:justify-between list-none hover:cursor-pointer md:gap-10"
        >
          <li
            id="home"
            class="md:hover:bg-white p-4 md:hover:rounded-full md:hover:text-[#4949ff]"
          >
            Home
          </li>
          <li
            id="panier"
            class="md:hover:bg-white p-4 md:hover:rounded-full md:hover:text-[#4949ff]"
          >
            Panier
          </li>
          <li
            class="md:hover:bg-white p-4 md:hover:text-[#4949ff] md:hover:rounded-full"
          >
            Profile
          </li>
        </ul>
      </nav>
    </header>
    <main
      id="main"
      class="flex-col flex md:mt-40  p-4 md:flex md:justify-center md:items-center md:flex-col items-center justify-center"
    >
      <div
        id="container-input"
        class="flex items-center justify-center m-6 bg-[#EFE4E4] rounded-full border md:pl-4 md:w-150 md:bg-white"
      >
        <img src="images/search.png" class="w-5 h-5" />
        <input
          id="search"
          class="focus:outline-none rounded-full p-4"
          type="search"
          placeholder="Recherchez vos jeux préférés en un instant"
        />
      </div>
      <div
        id="btnCategory"
        class="overflow-x-scroll md:flex md:gap-10 flex gap-6 font-bold md:overflow-hidden"
      >
        <button
          id="all"
          class="md:cursor-pointer inline-flex items-center justify-center h-12 gap-2 px-6 text-sm font-medium text-white rounded-full bg-[#4949ff] md:bg-white md:text-[#4949ff] md:font-medium"
        >
          All
        </button>
        <button
          id="RPG"
          class="md:cursor-pointer inline-flex items-center justify-center h-12 gap-2 px-6 text-sm font-medium text-white rounded-full bg-[#4949ff] md:bg-white md:text-[#4949ff] md:font-medium"
        >
          RPG
        </button>
        <button
          id="sport"
          class="md:cursor-pointer inline-flex items-center justify-center h-12 gap-2 px-6 text-sm font-medium text-white rounded-full bg-[#4949ff] md:bg-white md:text-[#4949ff] md:font-medium"
        >
          Sport
        </button>
        <button
          id="action"
          class="md:cursor-pointer inline-flex items-center justify-center h-12 gap-2 px-6 text-sm font-medium text-white rounded-full bg-[#4949ff] md:bg-white md:text-[#4949ff] md:font-medium"
        >
          Action
        </button>
        <button
          id="FPS"
          class="md:cursor-pointer inline-flex items-center justify-center h-12 gap-2 px-6 text-sm font-medium text-white rounded-full bg-[#4949ff] md:bg-white md:text-[#4949ff] md:font-medium"
        >
          FPS
        </button>
      </div>

      
      
    </main>
    <div
      id="galery-card"
      class=" mt-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 justify-items-center mb-20"
    ></div>
    <div id="panierContainer" class="md:mt-40 md:m-[50px] mb-[10px] pb-24 border-black   hidden">
      </div>
<!-- alert msg -->
<div id="alert" class="fixed hidden flex inset-12   items-center justify-center">
  <div class="bg-white border border-gray-300 shadow-lg rounded-lg p-6 text-center w-80">
    <p class="text-lg font-semibold text-green-800">Succès</p>
    <p class="text-black mt-2">Ajouter au panier avec succès</p>
    
    <button id="btnalert"
    
      class="mt-4 bg-blue-500 text-white px-4 py-2 rounded-full hover:bg-blue-600"
    >
      OK
    </button>
  </div>
</div>


    
    <footer
      class="md:hidden bg-[#4949ff] flex justify-between p-6 rounded-t-2xl fixed bottom-0 right-0 left-0"
    >
      <i
        id="homefooter"
        class="fa-solid fa-house fa-2x hover:cursor-pointer"
        style="color: rgb(255, 255, 255)"
      ></i>
      <i
        id="addpanier"
        class="fa-solid fa-basket-shopping fa-2x hover:cursor-pointer"
        style="color: rgb(255, 255, 255)"
      ></i>
      <i
        id="profil"
        class="fa-solid fa-user fa-2x hover:cursor-pointer"
        style="color: rgb(255, 255, 255)"
      ></i>
          <script src="./script.js" type="module"></script>

    </footer>
  </body>
</html>
